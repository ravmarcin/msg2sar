connected_components:
  desc:
    - |
      Grow a connected component mask for the unwrapped solution and write the mask to the file maskfile. A connected component is a region of pixels in the solution that is believed to have been unwrapped in a relative, internally self-consistent manner according to the statistical costs used. Regions that are smaller than a preselected threshold are masked out. Parameters for this option can be set in the configuration file. The connected component file is composed of unsigned characters by default, with all pixels of the same value belonging to the same connected component and zero corresponding to masked pixels.

sbas_pairs_covering_correlation_count:
  desc:
    - |
      In the Small Baseline Subset (SBAS) method, the selection of image pairs is a critical process aimed at maintaining high correlation (coherence) and minimizing decorrelation effects. This is achieved by adhering to strict thresholds for both spatial and temporal baselines, resulting in a network of connected interferometric pairs. 
      Principles of SBAS Pair Selection and Correlation
      The primary goal of the SBAS technique is to create an interconnected network of interferograms where each pair has a high likelihood of good coherence. 
      Minimizing Decorrelation: SAR image pairs with short temporal and spatial baselines are selected to reduce decorrelation (loss of signal correlation over time or distance). This approach ensures the quality and reliability of the interferometric phase, which is essential for accurate deformation measurement.
      Ensuring Redundancy: The selection process aims to generate a sufficient number of redundant interferograms. This redundancy is vital for preventing the propagation of errors, such as phase unwrapping issues, across the entire time series analysis.
      Optimizing Coherence: Coherence, or the cross-correlation coefficient between two complex SAR images, is the key metric. The conventional method uses fixed thresholds for baselines, but advanced techniques may use the average coherence itself as a more direct threshold to optimize pair combination, especially in areas with high variability like those with significant seasonal vegetation changes.
      Connection Graph: The selected pairs form a "connection graph," which visually represents the network of interferograms used in the processing. Software tools like the ASF Vertex SBAS Search or PyGMTSAR's tools help users select optimal pairs and visualize this graph, ensuring all acquisition dates are adequately covered. 
      The Role of Correlation in Processing
      During the SBAS processing, the correlation of the selected pairs is further leveraged: 
      A correlation threshold is often applied to select pixels that exhibit stable scattering patterns (coherent pixels or persistent scatterers) for detailed analysis.
      A correlation-weighted least-squares solution is used to calculate displacements, giving more weight to data from highly coherent areas and improving the accuracy of the final deformation time series. 
      By focusing on high-correlation, short-baseline pairs, the SBAS method effectively overcomes many of the limitations of traditional InSAR, enabling high-precision monitoring of ground deformation phenomena like land subsidence and landslides.

