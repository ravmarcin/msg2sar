      The original Sentinel-1 resolution (1 pixel spacing)

spatial_wavelenght:
  desc:
    - |
      In that sentence, “wavelength” does not refer to the radar electromagnetic wavelength (like C‑band or L‑band), but to the spatial wavelength of fringes in the interferogram at the chosen output resolution.

      ### Meaning in this context
      - When an interferogram is resampled to a given output pixel size, there is a maximum spatial frequency (i.e., minimum fringe spacing, or “wavelength” in pixels/meters) that can be represented without aliasing.  
      - “Wavelength = define anti-aliasing filter for the specified output resolution” means: you specify the smallest fringe spacing you want to preserve at that output resolution, and the software designs a low‑pass (anti‑alias) filter whose cutoff is set by that spatial wavelength so that higher spatial frequencies (tighter fringes than can be safely sampled) are filtered out.

      ### Why this matters in SBAS processing
      - If this “wavelength” is set too small (trying to keep very fine fringes at a coarse pixel size), aliasing will occur and phase will be misrepresented.  
      - If it is set too large, the filter will remove real deformation signals with relatively fine fringes, oversmoothing the interferogram.

      [1](https://lagrange.oca.eu/images/LAGRANGE/seminaires/patru.pdf)
      [2](https://www.thorlabs.com/images/PDF/AISCatalog/OCT-ProvenComponents_revC.pdf)
      [3](https://www.sealevel.com/how-and-why-to-use-an-anti-aliasing-filter)
      [4](https://www.spotimaging.com/downloads/public/pdf/omega_optical_filters.pdf)
      [5](https://pubs.aip.org/aip/rsi/article/86/7/074501/831392/Readout-for-intersatellite-laser-interferometry)
      [6](https://en.wikipedia.org/wiki/Optical_filter)
      [7](https://www.nist.gov/publications/wavelength-references-interferometry-air)

