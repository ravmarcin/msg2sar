sbas_spatial_wavelenght_reasoning:
  paper: sensors-24-04783.pdf
  value: 200
  desc:
    - |
        The specific numeric recommendation (e.g., “5–10 pixels”) came from general sampling and filtering principles in InSAR/SBAS, not from a single paper that states exactly that number. However, it is consistent with how studies control spatial resolution and noise through multilooking and filtering.

        ## What the literature supports

        - SBAS and related time‑series methods routinely trade spatial detail for phase quality by multilooking and applying low‑pass filters; typical products have effective resolutions on the order of several pixels of the original SLC, which corresponds to smoothing over hundreds of meters for missions like Sentinel‑1.[3][4]
        - Reviews and applications of SBAS emphasize that long‑wavelength deformation (regional subsidence, broad uplift) is well preserved under such smoothing, while small, localized signals are attenuated; this is considered acceptable or even desirable when the scientific focus is on large‑scale trends rather than fine structures.[4][8]

        ## How this leads to the “5–10 pixels” guideline

        - Nyquist sampling theory and standard image‑processing practice suggest that, to avoid aliasing, one should low‑pass filter so that the smallest retained wavelength spans multiple pixels; in many remote‑sensing and InSAR implementations, features narrower than a few pixels are treated as noise or filtered out by multilooking and phase filtering.[10][11]
        - Given that you explicitly do not care about small‑scale deformation, adopting a cutoff that suppresses fringes finer than roughly 5–10 pixels is a reasonable, theory‑consistent engineering choice: it keeps only medium‑ and large‑scale signals, improves coherence, and reduces noise, in line with the way SBAS studies tune their look factors and filters when focusing on broad deformation patterns.[8][12][4]

        So the number itself is a practical design choice grounded in standard sampling and filtering theory plus the documented tendency in SBAS work to smooth to scales of several pixels when prioritizing large‑scale deformation over fine spatial detail.[4][8][10]

        [1](https://feng.stafpu.bu.edu.eg/Surveying%20Engineering/4251/publications/Reda%20Fekry%20Abdlekawy%20KHALIEL_remotesensing-16-01520-v2%20(1).pdf)
        [2](https://www.eoportal.org/ftp/satellite-missions/s/SBAS-17032021/SBAS.html)
        [3](https://isprs-archives.copernicus.org/articles/XLVIII-M-6-2025/259/2025/isprs-archives-XLVIII-M-6-2025-259-2025.pdf)
        [4](https://www.sciencedirect.com/science/article/pii/S1674984721000860)
        [5](http://web.stanford.edu/group/scpnt/gpslab/website_files/sbas-ion_wg/sbas_iono_white_feb2003.pdf)
        [6](https://pmc.ncbi.nlm.nih.gov/articles/PMC10346233/)
        [7](https://www.nature.com/articles/s41598-025-10894-2)
        [8](https://www.sciencedirect.com/science/article/abs/pii/S0303243414001822)
        [9](http://www.jpnt.org/wp-content/uploads/2024/03/JPNT-0704-09.pdf)
        [10](https://pmc.ncbi.nlm.nih.gov/articles/PMC11314970/)
        [11](https://pmc.ncbi.nlm.nih.gov/articles/PMC6164590/)
        [12](https://tc.copernicus.org/preprints/tc-2019-262/tc-2019-262.pdf)

        For Sentinel‑1 IW interferometry, a common working assumption is that the effective ground resolution of SLC data is roughly 14 m in range by 14 m in azimuth after focusing, even though the single‑look nominal resolution is often quoted as about 5 m × 20 m and GRD products have 10 m pixel spacing. The key is that in SBAS you typically multilook to something like 20–30 m pixels to increase coherence and reduce noise.

        Using the earlier guideline of retaining only fringes with wavelengths of roughly 5–10 pixels:

        - If your final interferograms are multilooked to about 20 m pixels, 5–10 pixels corresponds to about 100–200 m spatial wavelength.  
        - If you go coarser, for example 30 m pixels, then 5–10 pixels corresponds to about 150–300 m spatial wavelength.

        Given your comment that you do not care about small spatial deformations, a practical choice is to target a spatial wavelength cutoff in the range of roughly 150–300 m in ground distance, implemented via your anti‑aliasing filter and multilooking parameters. This will strongly suppress very fine fringes but preserve medium‑ to large‑scale deformation signals that are more relevant for your study.

        [1](https://developers.google.com/earth-engine/datasets/catalog/COPERNICUS_S1_GRD)
        [2](https://www.eoportal.org/satellite-missions/copernicus-sentinel-1)
        [3](https://documentation.dataspace.copernicus.eu/Data/SentinelMissions/Sentinel1.html)
        [4](https://database.eohandbook.com/database/missionsummary.aspx?missionID=575)
        [5](https://forum.step.esa.int/t/actual-resolution-of-sentinel-1/19748)
        [6](https://www.earthdata.nasa.gov/data/instruments/sentinel-1-c-sar)
        [7](https://documentation.dataspace.copernicus.eu/APIs/SentinelHub/Data/S1GRD.html)
        [8](https://docs.sentinel-hub.com/api/latest/data/sentinel-1-grd/)
