      For connected components in PS landmask generation (to discard isolated pixels and retain spatially clustered high-coherence regions), recommend a size of 3–5 pixels minimum.[1][4]

      ## Why this range
      - Connected components analysis removes noise-induced single or tiny groups of pixels below the threshold, ensuring the landmask consists of robust clusters typical of urban/buildings/rocky areas; StaMPS/PSI workflows use small neighborhoods (e.g., 3–5 pixels at ~20 m resolution, or 60–100 m) to filter outliers while preserving PS density.[4][1]
