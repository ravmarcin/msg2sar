max_distance_baseline_reasoning:
  paper: 2006ESASP_610E__12C.pdf
  value: 300
  desc:
    - |
        For SBAS aimed at testing/using meteorological data (e.g., NWM/ERA5/GNSS/meteosat) to correct atmospheric phase screens, a conservative perpendicular baseline threshold around 100–300 m for C‑band missions (e.g., Sentinel‑1) is generally a good starting point, with a hard upper limit no higher than about 500 m for deformation‑focused work.[1][2]

        ## Why a conservative baseline

        - Atmospheric phase is largely independent of baseline, while geometric decorrelation and topographic residuals grow with increasing perpendicular baseline.[2][1]
        - If the goal is to isolate and quantify the benefit of meteo-based atmospheric corrections, it is preferable that loss of coherence and residual DEM errors do not dominate the interferometric phase; smaller baselines keep those contributions smaller and more stable.[1][2]

        ## Balancing baseline and sensitivity

        - Some baseline diversity is still useful because it helps separate topography from deformation in the SBAS inversion and can improve network robustness, so baselines that are “too small” everywhere can reduce sensitivity to height errors.[3][2]
        - A practical strategy is to aim for a network where most interferograms fall in the 100–300 m range, allow occasional pairs up to ~500 m to improve geometry, and discard very long baselines where coherence degrades significantly in your area of interest.[2][3][1]

        ## Adapting to your study

        - In vegetated or otherwise decorrelation‑prone regions, staying near the lower end (≈100–200 m) will likely give cleaner phase for testing meteo corrections; in arid or urban areas, you can push closer to 300–500 m without severe coherence loss.[4][2]
        - For a methodology paper, it can also be useful to run two SBAS chains: one “strict” (e.g., ≤200 m) and one “relaxed” (e.g., ≤500 m) and discuss how the apparent performance of the meteo corrections changes with baseline regime.[3][2]

        [1](https://hyp3-docs.asf.alaska.edu/guides/insar_product_guide/)
        [2](https://www.sciencedirect.com/science/article/pii/S1674984721000860)
        [3](http://adsabs.harvard.edu/full/2006ESASP.610E..12C)
        [4](https://isprs-archives.copernicus.org/articles/XLII-3-W10/315/2020/isprs-archives-XLII-3-W10-315-2020.pdf)

sbas_temporal_baseline_limit_reasoning:
  paper: sensors-24-04783.pdf
  value: 60
  desc:
    - |
        For SBAS, images are usually spaced as closely as the satellite repeat cycle allows (e.g., 6–12 days for Sentinel‑1), but the interferogram network uses a maximum temporal baseline on the order of a few months, tuned to land cover and the process you want to observe.[1][2]
    
        ## Typical temporal spacing
        
        - SBAS is built from “short temporal baseline” interferograms to reduce temporal decorrelation, so adjacent acquisitions are used whenever possible (e.g., 6 or 12 days for Sentinel‑1, 11 days for TerraSAR‑X, 46 days for Envisat).[2][3][4]
        - In practice, scenes over several years are included, but each interferometric pair is constrained by a maximum temporal baseline: many studies with Sentinel‑1 use limits of about 90–120 days for decorrelation‑prone surfaces, and sometimes up to ~3–4 months where coherence is more stable.[4][5][1]
        
        ## Choosing a max temporal baseline
        
        - If your area has vegetation, snow, or strong seasonal changes, a stricter maximum temporal baseline (≈60–90 days) helps keep coherence high and makes it easier to see the improvement from meteorological corrections.[1][4]
        - In arid, rocky, or urban regions, you can allow longer temporal baselines (≈120–180 days) to increase network connectivity, but should still exclude pairs whose coherence drops significantly in test interferograms.[6][5][1]
        
        ## For meteo‑correction research
        
        - To evaluate atmospheric corrections from meteorological or satellite data, it helps to work with dense time sampling: use nearly all consecutive acquisitions, enforce a moderate max temporal baseline (e.g., 90–120 days), and then compare results when including vs excluding the longest temporal pairs.[5][2][1]
        - This configuration gives enough temporal diversity to resolve deformation while keeping temporal decorrelation controlled, so changes in performance can be more confidently attributed to the quality of the atmospheric correction rather than loss of coherence.[4][5][1]
        
        [1](https://pmc.ncbi.nlm.nih.gov/articles/PMC11314970/)
        [2](https://www.sarmap.ch/tutorials/SBAS_Tutorial_562.pdf)
        [3](https://hyp3-docs.asf.alaska.edu/guides/insar_product_guide/)
        [4](https://tc.copernicus.org/preprints/tc-2019-262/tc-2019-262.pdf)
        [5](https://ieeexplore.ieee.org/document/9554071/)
        [6](https://pmc.ncbi.nlm.nih.gov/articles/PMC6164590/)
        [7](https://pmc.ncbi.nlm.nih.gov/articles/PMC6540355/)
        [8](https://earthconsole.eu/portfolio-item/small-baseline-subset-sbas-insar-beta-for-sentinel-1/)
        [9](https://earthconsole.eu/portfolio-item/sbas-insar-beta/)
