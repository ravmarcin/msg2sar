sbas_goldstein_psize_reasoning:
  paper: sensors-16-01976.pdf
  value: 32
  desc:
    - |
      For Goldstein filtering in Sentinel-1 InSAR interferograms, a block size of 32×32 pixels is a widely recommended starting point, with an overlap of about 16 pixels (half the block size).[2][6]

      ## Why this size
      - The Goldstein filter processes overlapping patches via FFT, smoothing the power spectrum raised to power α (typically 0.5–0.8); 32×32 provides good noise suppression without excessive blurring of fringes, balancing computation time and edge continuity.[1][6][2]
      - Smaller blocks (e.g., 16×16) risk poor frequency estimation in noisy areas, while larger ones (e.g., 64×64) can oversmooth deformation signals, especially in your case where you prioritize broader patterns over fine details.[3][1]

      ## Tuning for your study
      - With your focus on large-scale signals and prior 150–300 m wavelength cutoff, stick to 32×32 (or slightly larger, like 48×48 if coherence is high) to further suppress speckle without losing regional deformation trends.[1][2]
      - Test on a sample interferogram: compute phase standard deviation or coherence improvement, adjusting α adaptively (e.g., via coherence as in Baran modification).[6][1]

      [1](https://pmc.ncbi.nlm.nih.gov/articles/PMC5134634/)
      [2](https://step.esa.int/main/wp-content/help/versions/10.0.0/snap-toolboxes/org.jlinda.jlinda.nest.ui/operators/PhaseFilterOp.html)
      [3](https://ui.adsabs.harvard.edu/abs/2023SPIE12551E..0PX/abstract)
      [4](https://ieeexplore.ieee.org/document/7274723/)
      [5](https://journals.plos.org/plosone/article?id=10.1371%2Fjournal.pone.0308636)
      [6](https://doris.tudelft.nl/Literature/baran03.pdf)
      [7](https://www.sciencedirect.com/science/article/pii/S1569843225002687)
      [8](https://pdfs.semanticscholar.org/b1ba/32055fc9b92ea982ac7cb775e963ca17bcb8.pdf)

      A 200 m spatial wavelength cutoff for your anti-aliasing filter aligns well with Sentinel-1 IW SLC processing, where the nominal single-look resolution is approximately 5 m (range) by 20 m (azimuth), but multilooking to 10–20 m pixels is standard in SBAS workflows.[9][10][11]

      ## Pixels equivalent
      - At 10 m multilooked pixels (common starting point), 200 m corresponds to 20 pixels.  
      - At 20 m pixels (frequent in final SBAS products for noise reduction), it is 10 pixels.  
      Set your filter's minimum wavelength parameter to 10–20 pixels, depending on your exact multilooking factors—this ensures fringes finer than 200 m are suppressed while preserving larger-scale signals.[11][9]

      ## Compatibility with Goldstein
      - This cutoff pairs effectively with the recommended 32×32 pixel Goldstein block size, as the filter window (roughly 3× the cutoff wavelength in some implementations) will span ~30–60 pixels, providing consistent smoothing scales without excessive computation.[12][13]
      - In practice, test coherence improvement on sample interferograms after applying both filters to confirm the 200 m scale effectively isolates your desired broad deformation patterns.[13][12]

      [1](https://hyp3-docs.asf.alaska.edu/guides/insar_product_guide/)
      [2](https://backend.orbit.dtu.dk/ws/files/239535950/POAC19_059.pdf)
      [3](https://arxiv.org/html/2406.14789v1)
