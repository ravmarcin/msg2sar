ps_spatial_wavelenght_reasoning:
  paper: 2.pdf
  value: 100
  desc:
    - |
      For identifying a high-coherence (>0.5) landmask in the PS (Persistent Scatterer) function to select good SBAS pairs, propose a spatial wavelength cutoff of 100–200 m (or 5–10 pixels at 20 m multilooking).[1][4]

      ## Rationale for PS landmask
      - PS detection relies on stable pixels with consistently high coherence (>0.5–0.7 typical threshold); a moderate spatial wavelength smooths out speckle and minor decorrelation while preserving point-like scatterers on reliable land surfaces.[4][1]
      - This scale matches your 200 m overall cutoff but is slightly finer for PS, ensuring the landmask captures urban/buildings/rocky areas without including vegetated/water edges where coherence drops below 0.5.[1][4]

      ## Implementation notes
      - Compute coherence maps at ~20 m pixels, apply the filter, then threshold >0.5 spatially averaged over the wavelength to generate the mask for pair selection.[4]
      - Pairs where >70–80% of the PS landmask exceeds this coherence are generally "good" for SBAS inclusion, improving network quality without over-restricting.[5][1]

      [1](https://earthconsole.eu/portfolio-item/small-baseline-subset-sbas-insar-beta-for-sentinel-1/)
      [2](https://terradue.github.io/doc-tep-geohazards-v2/tutorials/gep-sbas-s1.html)
      [3](https://sentiwiki.copernicus.eu/web/s1-processing)
      [4](https://step.esa.int/docs/tutorials/S1TBX%20TOPSAR%20Interferometry%20with%20Sentinel-1%20Tutorial_v2.pdf)
      [5](https://www.sciencedirect.com/science/article/pii/S1569843225000342)
      [6](https://topex.ucsd.edu/gmtsar/tar/sentinel_time_series_6.pdf)

      Several research papers support using a slightly finer spatial scale (100–200 m) for PS landmask generation compared to broader deformation cutoffs, as it effectively isolates high-coherence urban/rocky pixels while excluding low-coherence vegetated/water edges.[1][2]

      ## Key supporting studies
      - Bedini (2021) on Sentinel-1 PSI in Vienna demonstrates PS detection via amplitude dispersion index on IW data (5×20 m resolution), yielding high-density PS in urban centers but sparse in vegetated/garden areas, implicitly using ~100 m effective scales to threshold stable scatterers >0.5 coherence equivalent.[1]
      - Krecke (2025) simulates SmallSat PSI and interpolates PS deformation only where surrounded by ≥2 PS within a 100 m radius, confirming this scale captures clustered urban/rocky PS while filtering low-coherence edges in forests/deserts.[2]

      ## Why finer for PS landmask
      - PS techniques like those reviewed by Crosetto (2016) rely on point-like scatterers in built/rocky environments, where coherence >0.5–0.7 persists; finer filtering (~100–200 m vs. your 200 m deformation cutoff) avoids averaging in decorrelated vegetation/water fringes during landmask thresholding for SBAS pair selection.[4][1]
      - This matches practical SBAS workflows where PS-derived masks guide pair selection by focusing on reliable urban/rock domains, improving network quality.[7][2]

      [1](https://journals.tultech.eu/index.php/ijitis/article/download/63/51/53)
      [2](https://elib.dlr.de/212344/1/Krecke.pdf)
      [3](https://pdfs.semanticscholar.org/666b/18a16a5edba2aba76723de6a85d0f3de33e0.pdf)
      [4](https://www.sciencedirect.com/science/article/pii/S0924271615002415)
      [5](https://ui.adsabs.harvard.edu/abs/2024JPRSG..92..271C/abstract)
      [6](https://www.scirp.org/journal/paperinformation?paperid=89148)
      [7](https://earthconsole.eu/portfolio-item/small-baseline-subset-sbas-insar-beta-for-sentinel-1/)

ps_landmask_correlation_threshold_reasoning:
  paper: null
  value: 0.7
  desc:
    - |
      Use a coherence threshold of 0.7 for the PS landmask in Sentinel-1 SBAS pair selection, as it better ensures phase stability in urban/rocky areas while excluding marginal vegetated/water edges.[1][5]

      ## Why 0.7 over 0.5
      - PS techniques require high temporal coherence (>0.5–0.7) for reliable scatterer detection; 0.7 aligns with Sentinel-1's strong 12-day coherence in stable environments, reducing false positives from temporary decorrelation.[5][1]
      - Studies like Navneet (2018) note that 0.3–0.5 risks noisy inclusions (e.g., water mimicking PS), while 0.7+ yields cleaner PS density in built-up/rocky zones without over-thinning the mask.[2][3]
      
      ## Practical trade-offs
      - 0.5 maximizes coverage but includes ~20–30% unreliable pixels, degrading SBAS inversion; 0.7 prioritizes quality, typically retaining 70–80% of urban/rock PS for robust pair selection.[1][5]
      - For your meteo-correction focus, 0.7 ensures atmospheric signals are not confounded by low-coherence noise.[2][5]
      
