      ## Implementation guidance
      - Apply 8-connected neighborhood (including diagonals) on the binary mask post-thresholding; retain components with ≥3–5 pixels to avoid over-thinning while excluding speckle artifacts.[1][4]
      - This supports reliable SBAS pair selection by focusing on contiguous high-coherence domains >0.7.[6][1]

