sbas_pairs_covering_correlation_count_reasoning:
  paper: 
  value: 3
  desc:
    - |
      For the count parameter in the PyGMTSAR function sbas_pairs_covering_correlation, a recommended starting value is often around 2 to 5. 
      Understanding the count Parameter
      The count parameter defines the minimum number of interferograms (pairs) that must cover each acquisition date (scene) in your time series analysis. This ensures a well-connected network of data, which is essential for the stability and accuracy of the SBAS method. 
      Recommended Values and Rationale
      The ideal count value ensures that every single image in your dataset is linked to a sufficient number of other images, providing redundancy and robust phase unwrapping. [1]
      count = 2: This is the absolute minimum to form a network (each date has at least two connections). It is a good starting point for a simple, fast initial run or when computational resources are limited.
      count = 3 to 5: This range provides a strong, robust network with sufficient redundancy to better mitigate noise and phase unwrapping errors. Many standard SBAS examples use values in this range for reliable results.
      count = 5+: Higher values create a very dense network, leading to more processing time and memory usage. This might be used for highly specific, high-precision research in very stable areas where decorrelation is not a major concern.
      Practical Advice
      Start with a value of 3. This usually offers a good balance between computational efficiency and result quality for most Sentinel-1 SBAS analyses.
      If you encounter problems with phase unwrapping errors or unreliable deformation results (e.g., jumps in the time series), increase the count value to 4 or 5.
      The function works in conjunction with baseline thresholds (temporal and spatial). The count parameter is the final condition to ensure network connectivity after those initial thresholds are applied.
      You can visualize the resulting connection graph in PyGMTSAR to ensure all dates are adequately covered before proceeding with the full processing pipeline [2]

      [1](https://www.patreon.com/posts/pygmtsar-python-88794359#:~:text=Lesson%206,-New&text=Explore%20PyGMTSAR's%20(Python%20InSAR)%201D,example%20Jupyter%20notebook%20attached%20below.)
      [2](https://github.com/AlexeyPechnikov/pygmtsar#:~:text=About%20PyGMTSAR,even%20on%20standard%20commodity%20hardware.)

sbas_unwrapping_correlation_limit:
  paper: uwrapping.pdf
  value: 0.4
  desc:
    - |
      For SBAS unwrapping (including in PyGMTSAR), a common and well‑supported practice is to use a **coherence / correlation limit in the range 0.3–0.5**, and to go toward the upper part of this range (around **0.4–0.5**) when you care about clean, stable unwrapping rather than maximizing spatial coverage. [forum.step.esa][1]
      ## Typical ranges in the literature
      - SBAS/ESBAS tutorials from sarmap describe an “unwrapping coherence threshold” below which pixels are not unwrapped; values around **0.3–0.4** are indicated as typical starting points, with higher thresholds used in noisy areas to avoid errors. [sarmap][2]
      - General InSAR practice (e.g., SNAP and GMTSAR discussions) often masks out pixels with coherence **<0.3** before unwrapping, and several experts recommend raising this toward **0.4–0.5** to reduce unwrapping errors when decorrelation is significant. [igppweb.ucsd][3]

      ## PyGMTSAR‑specific context
      - The PyGMTSAR docs and examples show unwrapping with a common correlation threshold parameter and emphasize that the optimal value should be estimated from the **stack correlation map**, rather than using a fixed universal number. [github][4]
      - In practice, many Sentinel‑1 SBAS workflows using GMTSAR/PyGMTSAR adopt thresholds corresponding roughly to **ρ ≈ 0.3–0.5**, with the lower end for arid/urban high‑coherence scenes and the upper end for vegetated or otherwise decorrelated areas. [mobigroup.github][5]

      ## Concrete recommendation
      - For your study (atmospheric‑correction focused, with already quite strict PS/landmask criteria), using **CORRLIMIT ≈ 0.4–0.5** is a good choice:  
        - Start at **0.4** if you want slightly better spatial coverage.  
        - Increase to **0.5** if you observe unwrap noise or residues in lower‑coherence regions.  
      - A practical approach is to inspect the histogram of the stack correlation over your high‑coherence landmask and pick CORRLIMIT such that you keep the clearly stable “mode” of the distribution while discarding the low‑correlation tail, as suggested in PyGMTSAR examples and discussions. [linkedin][6]

      [1](https://forum.step.esa.int/t/coherence-masking/17259)
      [2](https://www.sarmap.ch/tutorials/SBAS_ESBAS_Tutorial_610.pdf)
      [3](https://igppweb.ucsd.edu/~fialko/insar/unwrapping.pdf)
