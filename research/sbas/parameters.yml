      [5](https://topex.ucsd.edu/gmtsar/tar/sentinel_time_series_6.pdf)
      [6](https://publications.jrc.ec.europa.eu/repository/bitstream/JRC98532/marsecs1report2015_v32.pdf)
      [7](https://www.sciencedirect.com/science/article/pii/S0034425725005127)
      [8](https://sentiwiki.copernicus.eu/__attachments/1673968/S1-RS-MDA-52-7441%20-%20Sentinel-1%20Product%20Specification%202023%20-%203.14.1.pdf?inst-v=d9a951f0-c582-4302-a22a-9ac09d4011a4)
      [9](https://developers.google.com/earth-engine/datasets/catalog/COPERNICUS_S1_GRD)
